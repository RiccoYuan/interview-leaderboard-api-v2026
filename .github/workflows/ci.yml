name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Benchmark (Dry smoke)
        run: dotnet run -c Release --project tests/Leaderboard.Benchmarks --no-build -- --job Dry --filter *IndexComparison*

  load-smoke:
    runs-on: ubuntu-latest
    needs: build-test-benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore & build
        run: |
          dotnet restore
          dotnet build -c Release

      - name: Start API
        run: |
          dotnet run -c Release --no-build --project src/Leaderboard.Api --urls http://127.0.0.1:5016 &
          echo $! > api.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5016/ >/dev/null; then echo "API ready"; exit 0; fi
            sleep 1
          done
          echo "API failed to start"; exit 1
        env:
          ASPNETCORE_ENVIRONMENT: Production

      - name: NBomber load smoke (20 req/s, 5 s)
        run: dotnet run -c Release --no-build --project tests/Leaderboard.LoadTests -- http://127.0.0.1:5016 20 5

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi
